name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Type-check TypeScript
        run: npx --no-install tsgo --noEmit

      - name: Check formatting and linting
        run: npx --no-install biome check .

      - name: Build
        run: npm run build

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Validate Composer manifests
        run: |
          composer validate --strict
          composer validate --strict --working-dir=live-sandbox-editor

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Check PHP syntax
        run: |
          find live-sandbox-editor \
            -path 'live-sandbox-editor/vendor' -prune -o \
            -name '*.php' -print0 \
            | xargs -0 -n1 php -l
