name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Type-check TypeScript
        run: npx --no-install tsgo --noEmit

      - name: Check formatting and linting
        run: npx --no-install biome check .

      - name: Build
        run: npm run build

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Validate Composer manifests
        run: |
          composer validate --strict
          composer validate --strict --working-dir=live-sandbox-editor

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Check PHP syntax
        run: |
          find live-sandbox-editor src \
            -path 'live-sandbox-editor/vendor*' -prune -o \
            -name '*.php' -print0 \
            | xargs -0 -n1 php -l

      - name: Check PHP coding standards (src/)
        run: composer lint:src

  plugin-check:
    name: Plugin Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      # Run Plugin Check against the real shipped artifact: tools/build-zip.sh
      # produces dist/live-sandbox-editor/ with the Strauss-prefixed vendor
      # tree and dev files pruned. We use the project's pinned @wordpress/env
      # (tools/plugin-check/.wp-env.json mounts that built tree plus the
      # Plugin Check plugin) rather than WordPress/plugin-check-action, which
      # installs the latest wp-env globally at run time and has been failing to
      # initialize its environment.
      - name: Install Node dependencies
        run: npm ci --ignore-scripts

      - name: Build plugin zip
        run: bash tools/build-zip.sh

      - name: Start wp-env
        run: ../../node_modules/.bin/wp-env start --auto-port
        working-directory: tools/plugin-check

      - name: Run Plugin Check on the built artifact
        working-directory: tools/plugin-check
        run: |
          out=$(../../node_modules/.bin/wp-env run cli wp plugin check live-sandbox-editor --require=./wp-content/plugins/plugin-check/cli.php 2>/dev/null)
          printf '%s\n' "$out"
          ! printf '%s\n' "$out" | grep -qE '\tERROR\t'

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      # The plugin's runtime depends on wp-php-toolkit/reprint-exporter
      # (see live-sandbox-editor/composer.json) for the sandbox sync flow,
      # bundled prefixed under vendor-prefixed/. wp-env mounts
      # ../live-sandbox-editor as a plugin, so that directory must exist
      # before the specs boot Playground. The plugin's composer post-install
      # hook produces it via tools/strauss.sh (downloaded Strauss phar).
      - name: Install plugin Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --working-dir=live-sandbox-editor

      # Cache the Chromium binary in ~/.cache/ms-playwright keyed on the
      # exact @playwright/test version from package-lock.json. Must run
      # before `npm ci` so the postinstall step (`playwright install
      # chromium`) is a no-op on cache hit.
      - name: Read Playwright version
        id: pw
        run: echo "version=$(jq -r '.packages["node_modules/@playwright/test"].version' package-lock.json)" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}

      # `npm ci` runs `postinstall: playwright install chromium`, which
      # downloads the browser binary on cache miss and skips on hit.
      - name: Install Node dependencies
        run: npm ci

      # `install-deps` only installs apt packages (libnss3, libatk, …);
      # the browser binary is already on disk from postinstall or cache.
      - name: Install Playwright system dependencies
        run: node_modules/.bin/playwright install-deps chromium

      - name: Build JS bundle
        run: npm run build

      # `ensureWpEnvRunning()` in playwright.config.ts boots wp-env on
      # an auto-port at config-load time, so no explicit start step is
      # needed. retries=1 is wired via the CI env var below.
      - name: Run Playwright tests
        run: node_modules/.bin/playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore
